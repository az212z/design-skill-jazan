<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الصفحة غير موجودة | ديزاين سكِل</title>
<meta name="theme-color" content="#23211E">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;}
  body{min-height:100dvh;display:flex;align-items:center;justify-content:center;
    background:#23211E;color:#F4EFE8;font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
    text-align:center;padding:24px;line-height:1.7;}
  .wrap{max-width:520px;}
  .code{font-family:"Tajawal",sans-serif;font-weight:900;font-size:clamp(4.5rem,22vw,8rem);
    line-height:1;color:#B85C38;letter-spacing:-.03em;}
  h1{font-family:"Tajawal",sans-serif;font-weight:800;font-size:1.7rem;margin:10px 0 12px;}
  p{color:#C9BBA6;margin-bottom:28px;}
  a{display:inline-flex;align-items:center;gap:8px;background:#B85C38;color:#fff;
    font-family:"Tajawal",sans-serif;font-weight:700;padding:14px 28px;border-radius:999px;
    text-decoration:none;min-height:48px;transition:transform .16s cubic-bezier(.23,1,.32,1),background-color .2s;}
  a:hover{background:#9C4A2B;}
  a:active{transform:scale(.97);}
  a:focus-visible{outline:3px solid #C9BBA6;outline-offset:2px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>يبدو أن الرابط الذي تبحث عنه غير متوفر. لنعد بك إلى الاستوديو.</p>
    <a href="/design-skill-jazan/">العودة للرئيسية</a>
  </div>
</body>
</html>
